
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vessel Tracker (Free Plan Hack)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; display:flex; font-family:Arial; }
#map { flex:1; }
#sidebar {
  width:300px; background:#111; color:#fff;
  padding:15px; overflow-y:auto;
}
.vessel { border-bottom:1px solid #333; padding:10px 0; }
.live { color:#00ff88; }
.stale { color:#ffaa00; }
</style>
</head>

<body>

<div id="sidebar">
  <h2>🚢 My Vessels</h2>
  <div id="list"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================= CONFIG =================
const API_KEY = "9a60170cb54290d271c628a0d990b7b988589a46";

const vessels = {
  636020938: "TEST ACTIVE SHIP",  // guaranteed active
  649081582: "Hazi 1",
  306708000: "DIB",
  678000441: "Al Tarf",
  341368002: "Glory 1",
  306295000: "Arabian Energy"
};

// Store last seen
const vesselState = {};
const markers = {};

// ================= MAP =================
const map = L.map('map').setView([25.2, 55.3], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= UI =================
function updateUI() {
  const container = document.getElementById("list");
  container.innerHTML = "";

  Object.keys(vessels).forEach(mmsi => {
    const v = vesselState[mmsi];
    const name = vessels[mmsi];

    if (!v) {
      container.innerHTML += `<div class="vessel">${name}<br>❌ Not detected</div>`;
      return;
    }

    const age = (Date.now() - v.time) / 1000;
    const status = age < 120 ? "live" : "stale";

    container.innerHTML += `
      <div class="vessel ${status}">
        <strong>${name}</strong><br>
        ${status === "live" ? "🟢 Live" : "🟡 Last Seen"}<br>
        Lat: ${v.lat.toFixed(3)}<br>
        Lon: ${v.lon.toFixed(3)}<br>
        Speed: ${v.sog || 0} kn
      </div>
    `;
  });
}

// ================= AIS STREAM =================
const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

socket.onopen = () => {
  console.log("✅ Connected");

  socket.send(JSON.stringify({
    APIKey: API_KEY,

    // Focus region (VERY IMPORTANT)
    BoundingBoxes: [
      [[20, 40], [30, 60]],   // UAE / Gulf
      [[5, 60], [25, 80]]     // India routes
    ]
  }));
};

socket.onmessage = (event) => {
  const data = JSON.parse(event.data);

  let report = data.PositionReport || data.StandardClassBPositionReport;
  if (!report) return;

  const mmsi = report.MMSI;

  // Only care about YOUR vessels
  if (!vessels[mmsi]) return;

  const lat = report.Latitude;
  const lon = report.Longitude;

  if (!lat || !lon) return;

  const sog = report.Sog;

  // Save state
  vesselState[mmsi] = {
    lat, lon, sog,
    time: Date.now()
  };

  // Map marker
  if (!markers[mmsi]) {
    markers[mmsi] = L.marker([lat, lon])
      .addTo(map)
      .bindPopup(vessels[mmsi]);
  } else {
    markers[mmsi].setLatLng([lat, lon]);
  }

  console.log("🎯 Detected:", vessels[mmsi]);
  updateUI();
};

socket.onerror = (e) => console.error("Error", e);
socket.onclose = () => console.log("Closed");

// Refresh UI every 10 sec (for stale status)
setInterval(updateUI, 10000);

</script>

</body>
</html>
