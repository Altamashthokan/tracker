
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vessel Tracking Dashboard</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 300px;
      background: #111;
      color: #fff;
      padding: 15px;
      overflow-y: auto;
    }

    #sidebar h2 {
      margin-top: 0;
    }

    .vessel {
      border-bottom: 1px solid #333;
      padding: 10px 0;
      font-size: 14px;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>🚢 Vessel Status</h2>
  <div id="vesselList"></div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================= CONFIG =================
const API_KEY = "9a60170cb54290d271c628a0d990b7b988589a46";

const vessels = {
  "Hazi 1": { mmsi: 649081582 },
  "DIB": { mmsi: 306708000 },
  "Al Tarf": { mmsi: 678000441 },
  "Glory 1": { mmsi: 341368002 },
  "Arabian Energy": { mmsi: 306295000 }
};

// Map MMSI -> Name
const mmsiToName = {};
Object.keys(vessels).forEach(name => {
  mmsiToName[vessels[name].mmsi] = name;
});

// ================= MAP =================
const map = L.map('map').setView([25.2, 55.3], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

const markers = {};

// ================= UI =================
function updateSidebar(name, data) {
  let el = document.getElementById("vessel-" + name);

  if (!el) {
    el = document.createElement("div");
    el.id = "vessel-" + name;
    el.className = "vessel";
    document.getElementById("vesselList").appendChild(el);
  }

  el.innerHTML = `
    <strong>${name}</strong><br>
    Lat: ${data.lat.toFixed(4)}<br>
    Lon: ${data.lon.toFixed(4)}<br>
    Speed: ${data.sog || 0} kn<br>
    Heading: ${data.cog || 0}°<br>
    Updated: ${new Date().toLocaleTimeString()}
  `;
}

// ================= AIS STREAM =================
const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

socket.onopen = () => {
  console.log("✅ Connected to AISStream");

  socket.send(JSON.stringify({
    APIKey: API_KEY,

    // You can switch to global if needed
    BoundingBoxes: [[[20, 40], [30, 60]]],

    Filters: {
      MMSI: Object.keys(mmsiToName).map(Number)
    }
  }));
};

socket.onmessage = (event) => {
  const data = JSON.parse(event.data);

  let report = null;

  // Handle multiple AIS message types
  if (data.PositionReport) {
    report = data.PositionReport;
  } else if (data.StandardClassBPositionReport) {
    report = data.StandardClassBPositionReport;
  }

  if (!report) return;

  const mmsi = report.MMSI;

  if (!mmsiToName[mmsi]) return;

  const name = mmsiToName[mmsi];

  const lat = report.Latitude;
  const lon = report.Longitude;

  if (!lat || !lon) return;

  const sog = report.Sog;
  const cog = report.Cog;

  // Marker update
  if (!markers[mmsi]) {
    markers[mmsi] = L.marker([lat, lon])
      .addTo(map)
      .bindPopup(name)
      .openPopup();
  } else {
    markers[mmsi].setLatLng([lat, lon]);
  }

  // Update sidebar
  updateSidebar(name, { lat, lon, sog, cog });

  console.log("📍 Updated:", name);
};

socket.onerror = (err) => {
  console.error("❌ WebSocket Error:", err);
};

socket.onclose = () => {
  console.log("⚠️ Disconnected from AISStream");
};
</script>

</body>
</html>
